version: '3.8'

# ════════════════════════════════════════
# DÉFINITION DU RÉSEAU (AVEC SOUS-RÉSEAU IP)
# ════════════════════════════════════════
networks:
  est_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

services:

  # ════════════════════════════════════════
  # INFRASTRUCTURE
  # ════════════════════════════════════════

  keycloak:
    image: keycloak/keycloak
    container_name: keycloak
    ports:
      - "8080:8080" # Gardé ouvert pour accéder à l'interface d'admin
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      est_network:
        ipv4_address: 172.25.0.5

  cassandra:
    image: cassandra
    container_name: cassandra
    # ports: retirés car uniquement consulté par les MS en interne
    environment:
      CASSANDRA_CLUSTER_NAME: "espace-cluster"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces'"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      est_network:
        ipv4_address: 172.25.0.6

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000" # Accès API S3 externe
      - "9001:9001" # Accès Console admin
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      est_network:
        ipv4_address: 172.25.0.7

  # ════════════════════════════════════════
  # GATEWAY
  # ════════════════════════════════════════

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "80:80" # LE SEUL POINT D'ENTRÉE DE TON API !
    depends_on:
      - auth
      - upload
      - download
      - admin
      - ai
      - frontend
    restart: always
    networks:
      est_network:
        ipv4_address: 172.25.0.10

  # ════════════════════════════════════════
  # MICRO-SERVICES
  # ════════════════════════════════════════

  auth:
    build: ./services/ms-auth
    container_name: ms-auth
    # ports: supprimés -> Accès uniquement via Nginx ou réseau interne
    env_file:
      - ./services/ms-auth/.env
    volumes:
      - ./services/ms-auth:/app
    depends_on:
      - keycloak
    networks:
      est_network:
        ipv4_address: 172.25.0.20

  upload:
    build: ./services/ms-upload
    container_name: ms-upload
    # ports: supprimés
    env_file:
      - ./services/ms-upload/.env
    volumes:
      - ./services/ms-upload:/app
    depends_on:
      cassandra:
        condition: service_healthy
      minio:
        condition: service_started
      auth:
        condition: service_started
    networks:
      est_network:
        ipv4_address: 172.25.0.21

  download:
    build: ./services/ms-download
    container_name: ms-download
    # ports: supprimés
    env_file:
      - ./services/ms-download/.env
    volumes:
      - ./services/ms-download:/app
    depends_on:
      cassandra:
        condition: service_healthy
      minio:
        condition: service_started
      auth:
        condition: service_started
    networks:
      est_network:
        ipv4_address: 172.25.0.22

  admin:
    build: ./services/ms-admin
    container_name: ms-admin
    # ports: supprimés
    env_file:
      - ./services/ms-admin/.env
    volumes:
      - ./services/ms-admin:/app
    depends_on:
      cassandra:
        condition: service_healthy
      auth:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      est_network:
        ipv4_address: 172.25.0.23

  ai:
    build: ./services/ms-ai
    container_name: ms-ai
    # ports: supprimés
    volumes:
      - ./services/ms-ai:/app
      - ollama_data:/root/.ollama
    networks:
      est_network:
        ipv4_address: 172.25.0.24

  # ════════════════════════════════════════
  # FRONTEND
  # ════════════════════════════════════════

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - auth
    networks:
      est_network:
        ipv4_address: 172.25.0.30

volumes:
  keycloak_data:
  cassandra_data:
  minio_data:
  ollama_data: